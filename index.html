<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SVJ AI Core HUD</title>
    <link rel="stylesheet" href="style.css">
    <!-- Cyberpunk Typography -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
</head>
<body>
    <div class="hud-overlay"></div>
    
    <div class="app-container" id="main-container">
        
        <!-- Cybernetic Core Header -->
        <div class="header">
            <div class="logo-wrapper" id="logo-trigger">
                <h1 class="svj-logo">SVJ</h1>
            </div>
            <h2>AI HUD SYSTEM</h2>
        </div>

        <div class="simulation-area">
            
            <div id="loading" class="hidden">
                <p class="typing-text">CORE PROCESSING...</p>
            </div>
            
            <!-- Radical HUD Card -->
            <div id="task-card" class="task-card">
                <div id="task-badge">AWAITING SEQUENCE</div>
                <h3 id="task-name">SVJ PROTOCOL</h3>
                <p id="task-content">Awaiting operator execution sequence.</p>
                
                <div class="actions" id="actions-container">
                    <button class="btn" onclick="startSim(event)">ENGAGE CORE</button>
                </div>
            </div>

            <!-- Perspective Rendered Terminal Floating off floor -->
            <div id="terminal" class="terminal-container">
                <div class="terminal-header">
                    <span>SYS_LOG :: ROOT</span>
                </div>
                <div class="terminal-body" id="terminal-body">
                    <p>> SYSTEM MATRIX LOADED...</p>
                    <p>> AWAITING INPUT.</p>
                </div>
            </div>
            
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
